services:
  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  orders-api:
    build:
      context: ./kafka/orders-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: orders.events
      KAFKA_PARTITIONS: 2
    depends_on:
      - kafka

  inventory-consumer:
    build:
      context: ./kafka/consumer
    restart: unless-stopped
    environment:
      SERVICE_NAME: inventory-consumer
      ACTION_LABEL: Reserva de inventario
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: orders.events
      KAFKA_GROUP_ID: inventory-service-group
      KAFKA_PARTITIONS: 2
      FROM_BEGINNING: "true"
      PROCESSING_DELAY_MS: 1000
    depends_on:
      - kafka

  billing-consumer:
    build:
      context: ./kafka/consumer
    restart: unless-stopped
    environment:
      SERVICE_NAME: billing-consumer
      ACTION_LABEL: Generacion de factura
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: orders.events
      KAFKA_GROUP_ID: billing-service-group
      KAFKA_PARTITIONS: 2
      FROM_BEGINNING: "true"
      PROCESSING_DELAY_MS: 1200
    depends_on:
      - kafka

  notification-consumer:
    build:
      context: ./kafka/consumer
    restart: unless-stopped
    environment:
      SERVICE_NAME: notification-consumer
      ACTION_LABEL: Envio de notificacion
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: orders.events
      KAFKA_GROUP_ID: notification-service-group
      KAFKA_PARTITIONS: 2
      FROM_BEGINNING: "true"
      PROCESSING_DELAY_MS: 1500
    depends_on:
      - kafka
